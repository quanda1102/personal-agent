services:
  # Database
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: quanda1102
      POSTGRES_PASSWORD: Aikido202
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quanda1102 -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # Cache
  redis:
    image: redis:7
    container_name: redis
    command: ["redis-server", "--requirepass", "Aikido202"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Aikido202", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  # Kong Database Migration
  kong-migrations:
    image: kong:3.4
    container_name: kong-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: quanda1102
      KONG_PG_PASSWORD: Aikido202
      KONG_PG_DATABASE: user_db
    command: kong migrations bootstrap
    restart: "no"
    networks:
      - backend

  # Kong API Gateway
  kong:
    image: kong:3.4
    container_name: kong
    depends_on:
      postgres:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: quanda1102
      KONG_PG_PASSWORD: Aikido202
      KONG_PG_DATABASE: user_db
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_PREFIX: /tmp/kong_prefix
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    tmpfs:
      - /tmp/kong_prefix:exec,size=64M
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - backend
      - frontend

  # User Service
  user-service:
    build:
      context: ../../services/user
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://quanda1102:Aikido202@postgres:5432/user_db
      REDIS_URL: redis://:Aikido202@redis:6379/0
      JWT_SECRET_KEY: aikido200222
      JWT_EXPIRED_HOURS: 1
      EX_SECRET_KEY: aikido202
      EX_EXPIRED_DAY: 7
      SUPER_ADMIN_USERNAME: quanda1102
      SUPER_ADMIN_EMAIL: dangaq10@gmail.com
      SUPER_ADMIN_PASSWORD: Aikido202
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
