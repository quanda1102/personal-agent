# Kong Configuration File
# Documentation: https://docs.konghq.com/gateway/latest/reference/configuration/

# Basic Configuration
prefix = /usr/local/kong/
log_level = info
error_log = /dev/stderr
access_log = /dev/stdout

# Database Configuration
database = postgres
pg_host = postgres-db
pg_port = 5432
pg_user = quanda1102
pg_password = Aikido202@
pg_database = kong_db
pg_schema = public

# Admin API Configuration
admin_listen = 0.0.0.0:8001
admin_access_log = /dev/stdout
admin_error_log = /dev/stderr
admin_gui_listen = 0.0.0.0:8002
admin_gui_url = http://localhost:8002

# Proxy Configuration
proxy_listen = 0.0.0.0:8000
proxy_access_log = /dev/stdout
proxy_error_log = /dev/stderr

# SSL Configuration (for production)
ssl_cert_key = /etc/kong/ssl/kong.key
ssl_cert = /etc/kong/ssl/kong.crt

# Cluster Configuration
cluster_listen = 0.0.0.0:8005
cluster_control_plane = 127.0.0.1:8005

# Declarative Configuration
declarative_config = /etc/kong/kong.yml
declarative_config_string = ""

# Plugin Configuration
plugins = bundled,kong-auth-validator
pluginserver_names = kong-auth-validator

# Custom Plugin Path
lua_package_path = /usr/local/share/lua/5.1/?.lua;/usr/local/share/lua/5.1/?/init.lua;/opt/kong/?.lua;/opt/kong/?/init.lua;;

# DNS Configuration
dns_resolver = 8.8.8.8,8.8.4.4
dns_hostsfile = /etc/hosts
dns_order = LAST,SRV,A,CNAME

# Nginx Configuration
nginx_worker_processes = auto
nginx_daemon = off
real_ip_header = X-Real-IP
real_ip_recursive = off
trusted_ips = 0.0.0.0/0,::/0

# Memory and Performance
mem_cache_size = 128m
nginx_http_lua_shared_dict = kong 5m
nginx_http_lua_shared_dict = kong_db_cache 128m

# Security
headers = server_tokens
headers = latency_tokens
anonymous_reports = off

# Status API
status_listen = 0.0.0.0:8100
status_access_log = off
status_error_log = /dev/stderr

# Development Settings (remove in production)
portal_gui_host = 0.0.0.0:8003
portal_gui_protocol = http
portal_gui_listen = 0.0.0.0:8003
